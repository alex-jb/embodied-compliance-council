[project]
name = "orallexa-risk"
version = "0.1.0a1"
description = "Institutional risk primitives (VaR, Expected Shortfall, factor exposures, beta decomposition, concentration limits, sector exposure, correlation) exposed as typed Anthropic tool calls for the Orallexa 5-voice council."
authors = [
    { name = "Alex Xiaoyu Ji", email = "alex@vibexforge.com" },
    { name = "Loredana Carmen Levitchi" },
]
license = { text = "MIT" }
readme = "README.md"
requires-python = ">=3.10"

dependencies = [
    "numpy>=2.0",
    "pandas>=2.2",
    "scipy>=1.13",
    "pydantic>=2.9,<3",
]

[project.optional-dependencies]
test = ["pytest>=8", "pytest-cov>=5"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/orallexa_risk"]
