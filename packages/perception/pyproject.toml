[project]
name = "embodied-perception"
version = "0.1.0a1"
description = "Perception primitives (open-vocab object detection, segmentation, depth) for the Embodied Compliance Council Year-2 XR scope. Stub providers ship now; real model adapters arrive when Loredana's Orallexa XR scope unlocks. Spec: docs/dr-ngo-final/proposal-v2.pdf."
authors = [
    { name = "Alex Xiaoyu Ji", email = "alex@vibexforge.com" },
    { name = "Loredana Carmen Levitchi" },
]
license = { text = "MIT" }
readme = "README.md"
requires-python = ">=3.10"

dependencies = [
    "numpy>=2.0",
    "pydantic>=2.9,<3",
]

[project.optional-dependencies]
test = ["pytest>=8", "pytest-cov>=5"]
yolo_world = ["ultralytics>=8.3"]
sam2 = ["torch>=2.4", "torchvision>=0.19"]
depth_anything = ["transformers>=4.45", "torch>=2.4"]
all = ["ultralytics>=8.3", "torch>=2.4", "torchvision>=0.19", "transformers>=4.45"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/embodied_perception"]

[tool.pytest.ini_options]
testpaths = ["tests"]
